<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>CSV / XLSX Yükle</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
    .container { max-width: 500px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    h2 { margin-top: 0; }
    label { display: block; margin: 15px 0 5px; font-weight: 600; }
    input, select, button { width: 100%; padding: 10px; box-sizing: border-box; margin-bottom: 10px; }
    button { background: #4f46e5; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background: #4338ca; }
    #result { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; }
    .success { background: #d4edda; color: #155724; display: block !important; }
    .error { background: #f8d7da; color: #721c24; display: block !important; }
  </style>
</head>
<body>
  <div class="container">
    <h2>CSV / XLSX Ürün Yükle</h2>
    <form id="uploadForm">
      <label for="userId">Kullanıcı ID</label>
      <input type="number" id="userId" name="userId" required>

      <label for="file">Dosya (.csv veya .xlsx)</label>
      <input type="file" id="file" name="file" accept=".csv,.xlsx" required>

      <button type="submit">Yükle</button>
    </form>
    <div id="result"></div>
  </div>

  <script>
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const fd = new FormData(form);
      const res = await fetch('/api/products/upload', { method: 'POST', body: fd });
      const data = await res.json();
      const el = document.getElementById('result');
      el.className = res.ok ? 'success' : 'error';
      el.textContent = data.message || data.error || 'Bilinmeyen hata';
    });
  </script>
</body>
</html>
